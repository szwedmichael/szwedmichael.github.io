    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function getAllCards() {
    var all = [];
    Object.keys(DECKS).forEach(function(k) {
      DECKS[k].cards.forEach(function(c) { all.push(c); });
    });
    return all;
  }

  function getColor() {
    if (activeDeck === "All Mixed") return "mix";
    return DECKS[activeDeck].color;
  }

  function getBtnColor() {
    var c = getColor();
    if (c === "and") return "#1a3a6b";
    if (c === "mix") return "#2d2d2d";
    return "#8b1a1a";
  }

  function initDeck() {
    var cards = activeDeck === "All Mixed" ? getAllCards() : DECKS[activeDeck].cards;
    queue = shuffle(cards);
    drawn = 0;
    updateStats();
    document.getElementById('btn-draw').style.background = getBtnColor();
  }

  function updateStats() {
    document.getElementById('drawn-count').textContent = drawn;
    document.getElementById('remaining-count').textContent = Math.max(0, queue.length - drawn);
  }

  function getCardClass(card) {
    if (activeDeck === "All Mixed") {
      if (card.src === "{THE AND}") return "and-card";
      if (card.w) return "wildcard";
      return "regular";
    }
    if (getColor() === "and") return "and-card";
    if (card.w) return "wildcard";
    return "regular";
  }

  function getCardLabel(card) {
    if (activeDeck === "All Mixed") {
      if (card.w) return "Wildcard · " + card.src;
      return card.src;
    }
    if (card.w) return "Wildcard";
    return activeDeck;
  }

  function drawCard() {
    if (drawn >= queue.length) {
      var cards = activeDeck === "All Mixed" ? getAllCards() : DECKS[activeDeck].cards;
      queue = shuffle(cards);
      drawn = 0;
    }
    var card = queue[drawn++];
    updateStats();
    renderCard(card);
  }

  function renderCard(card) {
    var area = document.getElementById('card-area');
    var cls = getCardClass(card);
    var label = getCardLabel(card);
    var levelHtml = card.l ? '<div class="card-level">' + card.l + '</div>' : '';
    area.innerHTML = '<div class="card ' + cls + '"><div class="card-type">' + label + '</div><div class="card-text">' + card.t + '</div>' + levelHtml + '</div>';
  }

  function getTabClass(key, isMix) {
    if (key !== activeDeck) return 'tab';
    if (isMix) return 'tab active-mix';
    if (key === '{THE AND}') return 'tab active-and';
    return 'tab active-wnrs';
  }

  function selectDeck(name, isMix) {
    activeDeck = name;
    var tabs = document.querySelectorAll('.tab');
    TAB_DEFS.forEach(function(def, i) {
      tabs[i].className = getTabClass(def.key, def.isMix);
    });
    initDeck();
    var color = getColor();
    var cls = color === "and" ? "and-card" : "regular";
    var area = document.getElementById('card-area');
    area.innerHTML = '<div class="card ' + cls + '"><div class="card-type">' + name + '</div><div class="card-text">Press Draw a card to begin</div></div>';
    updateStats();
  }

  var tabsEl = document.getElementById('tabs');
  TAB_DEFS.forEach(function(def) {
    var btn = document.createElement('button');
    btn.className = getTabClass(def.key, def.isMix);
    btn.textContent = def.key;
    btn.setAttribute('data-deck', def.key);
    btn.addEventListener('click', (function(d) {
      return function() { selectDeck(d.key, d.isMix); };
    })(def));
    tabsEl.appendChild(btn);
  });

  document.getElementById('btn-draw').addEventListener('click', drawCard);
  document.getElementById('btn-skip').addEventListener('click', drawCard);

  initDeck();
})();
</script>
